name: PTY Study Buddy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Dar permisos al Maven Wrapper
        run: chmod +x mvnw

      - name: Verificar formato (Spotless)
        run: ./mvnw spotless:check

      - name: Análisis estático y build
        run: ./mvnw -T 1C verify -DskipTests

      - name: Subir reporte HTML de Detekt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-report
          path: detekt/reports/detekt.html
