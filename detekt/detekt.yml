build:
  maxIssues: 0

config:
  validation: true

complexity:
  LongMethod:
    active: true
    threshold: 80
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 20
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 15
    thresholdInInterfaces: 10
    thresholdInObjects: 10
    thresholdInEnums: 5

  CyclomaticComplexMethod:
    active: true
    threshold: 15

  NestedBlockDepth:
    active: true
    threshold: 4

potential-bugs:
  UnsafeCast:
    active: true

  UnreachableCode:
    active: true

  EqualsWithHashCodeExist:
    active: true

exceptions:
  SwallowedException:
    active: true

  ThrowingExceptionFromFinally:
    active: true

  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Exception
      - Throwable
      - RuntimeException

performance:
  ForEachOnRange:
    active: true

empty-blocks:
  EmptyCatchBlock:
    active: true

  EmptyFunctionBlock:
    active: true

style:
  WildcardImport:
    active: false

  UnusedPrivateMember:
    active: true

  MagicNumber:
    active: false