spring.application.name=psb
server.port=8088
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
secret.key=${JWT_KEY_BASE64}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=7MB
spring.devtools.restart.enabled=true
sendgrid.key=${PTY_STUDY_BUDDY_KEY}
tutor.approval.template=${APPROVED_TUTOR_ID}
tutor.dissaproval.template=${DISSAPPROVED_TUTOR_ID}
inscription.notice.template=${INSCRIPTION_NOTICE_ID}
cancellation.notice.template=${INSCRIPTION_CANCELLATION_ID}
session.cancellation.template=${SESSION_CANCELLATION_ID}
bucket.region=${AWS_REGION}
bucket.access.key.id=${AWS_ACCESS_KEY_ID}
bucket.secret.key=${AWS_SECRET_ACCESS_KEY}
bucket.name=${AWS_S3_BUCKET_NAME}